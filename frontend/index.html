<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 40px;
    }
    .box {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
    textarea, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
    }
    #reply {
      margin-top: 20px;
      background: #f0f0f0;
      padding: 15px;
      border-radius: 8px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>AI Chatbot</h2>
    <textarea id="message" rows="5" placeholder="Type your message"></textarea>
    <button onclick="sendMessage()">Ask AI</button>
    <div id="reply">Reply will appear here...</div>
  </div>

  <script>
    async function sendMessage() {
      const message = document.getElementById("message").value;
      const replyBox = document.getElementById("reply");
      replyBox.innerText = "Thinking...";

      try {
        const res = await fetch("http://localhost:5000/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const data = await res.json();
        replyBox.innerText = data.reply || data.error;
      } catch (err) {
        replyBox.innerText = "Error connecting to backend";
      }
    }
  </script>
</body>
</html>
